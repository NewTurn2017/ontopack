name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            archive: ontopack-linux-x86_64.tar.gz
          - name: macos
            os: macos-latest
            archive: ontopack-macos.tar.gz
          - name: windows-x86_64
            os: windows-latest
            archive: ontopack-windows-x86_64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binaries
        run: cargo build --release --locked -p pack-cli -p pack-mcp

      - name: Package Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/ontopack
          cp target/release/pack target/release/pack-mcp README.md LICENSE dist/ontopack/
          tar -C dist -czf "dist/${{ matrix.archive }}" ontopack

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\ontopack | Out-Null
          Copy-Item target\release\pack.exe dist\ontopack\
          Copy-Item target\release\pack-mcp.exe dist\ontopack\
          Copy-Item README.md dist\ontopack\
          Copy-Item LICENSE dist\ontopack\
          Compress-Archive -Path dist\ontopack -DestinationPath "dist\${{ matrix.archive }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          find release-assets -type f -print0 | sort -z | xargs -0 sha256sum > release-assets/SHA256SUMS.txt
          cat release-assets/SHA256SUMS.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(find release-assets -type f | sort)
          gh release create "$TAG_NAME" "${files[@]}" \
            --title "OntoPack ${TAG_NAME}" \
            --notes "Prebuilt OntoPack CLI and MCP server artifacts. Verify downloads with SHA256SUMS.txt." \
            --verify-tag
